<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a4a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="麻將平台">
<link rel="manifest" href="../manifest.json">
<script src="../js/errorHandler.js"></script>
<title>麻將對戰</title>
<style>
/* ═══ reset ══════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a4a2a;
  font-family: 'Noto Serif TC', serif;
  height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column;
  color: #fff; user-select: none;
}

/* ═══ 頂部狀態列 ══════════════════════════ */
#top-bar {
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; font-size: 12px; flex-shrink: 0;
}
#top-bar a { color: #ffd700; text-decoration: none; font-size: 13px; }
#room-info { color: #aaffcc; flex: 1; text-align: center; }
#wall-count { color: #ffd700; font-weight: bold; }

/* ═══ 主桌面 ══════════════════════════════ */
#game-table {
  flex: 1;
  display: grid;
  grid-template-areas:
    "top    top    top"
    "left   center right"
    "bottom bottom bottom";
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 72px 1fr 72px;
  min-height: 0;
  gap: 2px;
  padding: 4px;
}

/* ═══ 對家（上方）══════════════════════════ */
#zone-top {
  grid-area: top;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 6px;
}
#zone-top .opp-name { font-size: 11px; color: #aaffcc; }
#zone-top .opp-hand-row { display: flex; gap: 2px; justify-content: center; }

/* ═══ 上家 / 下家（側邊）══════════════════ */
.zone-side {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  padding: 4px 2px;
  background: rgba(0,0,0,0.15); border-radius: 8px;
}
#zone-left  { grid-area: left; }
#zone-right { grid-area: right; }
.zone-side .opp-name { font-size: 10px; color: #aaffcc; writing-mode: vertical-lr; text-orientation: mixed; }
.zone-side .opp-hand-col { display: flex; flex-direction: column; gap: 2px; align-items: center; }

/* ═══ 中央棄牌堆 ══════════════════════════ */
#zone-center {
  grid-area: center;
  background: rgba(0,0,0,0.2); border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  padding: 6px; overflow: hidden; min-height: 0;
}
#pile-grid {
  display: flex; flex-wrap: wrap; gap: 2px;
  justify-content: center; align-content: center;
  max-width: 100%; max-height: 100%;
}
#last-action-msg {
  font-size: 14px; font-weight: bold; color: #ffd700;
  min-height: 20px; text-align: center;
}

/* ═══ 自家底部 ══════════════════════════════ */
#zone-bottom {
  grid-area: bottom;
  background: rgba(0,0,0,0.3); border-radius: 8px 8px 0 0;
  padding: 4px 6px 6px;
  display: flex; flex-direction: column; gap: 4px;
}
#my-melds-row {
  display: flex; gap: 3px; flex-wrap: wrap; min-height: 26px;
  align-items: center;
}
#my-hand-row {
  display: flex; gap: 2px; justify-content: center;
  flex-wrap: wrap;
}

/* ═══ 牌組件 ══════════════════════════════ */
.tile {
  display: inline-flex; align-items: center; justify-content: center;
  background: #f5edd0; color: #1a1a1a;
  border-radius: 3px; font-size: 11px; font-weight: bold;
  cursor: default; transition: transform .1s, box-shadow .1s;
  box-shadow: 0 2px 3px rgba(0,0,0,0.5);
  line-height: 1; text-align: center;
  flex-shrink: 0;
}
/* 正常手牌大小 */
.tile.hand { width: 30px; height: 40px; font-size: 12px; cursor: pointer; }
.tile.hand.selected { transform: translateY(-8px); box-shadow: 0 6px 10px rgba(255,215,0,0.6); }
.tile.hand.drawn { border: 2px solid #ffd700; }
.tile.hand.tingable { border: 2px solid #4dff88; }
.tile.hand:active { transform: translateY(-4px); }
/* 牌背 */
.tile.back { background: #234a80; color: transparent; }
.tile.back.sm { width: 18px; height: 26px; }
.tile.back.xs { width: 12px; height: 18px; }
/* 棄牌堆小牌 */
.tile.pile { width: 22px; height: 30px; font-size: 9px; }
.tile.pile.last { border: 2px solid #ffd700; }
/* 花牌 */
.tile.flower { background: #3a6a1a; color: #88ff44; }
/* 對碰槓牌組 */
.tile.meld { width: 24px; height: 32px; font-size: 10px; }

/* ═══ 動畫 keyframes ════════════════════════ */
@keyframes tileIn {
  from { transform: scale(0.5) translateY(20px); opacity: 0; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
@keyframes tileDrawn {
  0%   { transform: translateY(-12px) scale(1.12); box-shadow: 0 0 0 3px #ffd700; }
  60%  { transform: translateY(0)     scale(1.05); }
  100% { transform: translateY(0)     scale(1); }
}
@keyframes actionBtnIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes huFlash {
  0%, 100% { box-shadow: none; }
  50%       { box-shadow: 0 0 30px 10px rgba(255,215,0,0.5); }
}
@keyframes pileIn {
  from { transform: scale(1.4) translateY(-6px); opacity: 0.6; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
@keyframes resultPop {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes toastSlide {
  from { transform: translateX(-50%) translateY(10px); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.08); }
}

.tile.anim-in      { animation: tileIn    0.18s ease-out both; }
.tile.hand.drawn   { animation: tileDrawn 0.25s ease-out both; border: 2px solid #ffd700; }
.action-btn        { animation: actionBtnIn 0.15s ease-out both; }
.tile.pile.last    { animation: pileIn    0.20s ease-out both; border: 2px solid #ffd700; }
.overlay-card      { animation: resultPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
.action-btn.btn-hu { animation: actionBtnIn 0.15s ease-out both, pulse 0.8s 0.2s ease-in-out 3; }
#toast.show        { animation: toastSlide 0.2s ease-out; }

/* 音效開關按鈕 */
#sound-toggle {
  background: none; border: 1px solid rgba(255,255,255,.2);
  color: #aaa; font-size: 14px; border-radius: 8px;
  padding: 2px 8px; cursor: pointer; line-height: 1;
}
#sound-toggle.muted { opacity: 0.4; }

/* ── 快捷語 ── */
#quick-chat-btn {
  background: none; border: 1px solid rgba(255,255,255,.2);
  color: #aaa; font-size: 14px; border-radius: 8px;
  padding: 2px 8px; cursor: pointer; line-height: 1;
}
#quick-chat-panel {
  display: none; position: fixed; bottom: 80px; right: 10px;
  background: rgba(20,10,40,0.96); border: 1px solid rgba(255,215,0,.3);
  border-radius: 16px; padding: 10px 8px; z-index: 200;
  display: none; flex-direction: column; gap: 6px; min-width: 130px;
}
#quick-chat-panel.open { display: flex; }
.qc-btn {
  background: rgba(255,255,255,0.07); border: none; color: #fff;
  border-radius: 10px; padding: 8px 12px; font-size: 13px;
  cursor: pointer; text-align: left; display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.qc-btn:active { background: rgba(255,215,0,0.2); }

/* ── 快捷語氣泡 ── */
.qc-bubble {
  position: absolute; background: rgba(255,215,0,0.9); color: #1a0a00;
  border-radius: 16px; padding: 6px 12px; font-size: 12px; font-weight: bold;
  white-space: nowrap; pointer-events: none;
  animation: bubblePop .3s ease-out, bubbleFade .4s 1.8s ease-in forwards;
  z-index: 150;
}
@keyframes bubblePop  { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes bubbleFade { to { opacity: 0; transform: translateY(-12px); } }

/* 牌色分類 */
.suit-man { color: #cc2200; }
.suit-pin { color: #0044cc; }
.suit-sou { color: #006622; }
.suit-honor { color: #5500aa; }
.suit-flower { background: #3a6a1a !important; color: #aaffaa !important; }

/* ═══ 動作按鈕列 ════════════════════════════ */
#action-bar {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; min-height: 36px; align-items: center;
}
.action-btn {
  padding: 6px 14px; border-radius: 16px;
  font-size: 13px; font-weight: bold;
  border: none; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.action-btn:active { transform: scale(0.93); }
.action-btn:disabled { opacity: 0.35; cursor: default; }
.btn-hu    { background: #ff4444; color: #fff; }
.btn-pong  { background: #ff9900; color: #fff; }
.btn-kong  { background: #9900ff; color: #fff; }
.btn-chow  { background: #0088ff; color: #fff; }
.btn-pass  { background: rgba(255,255,255,0.15); color: #ddd; }
.btn-ting  { background: #00cc66; color: #fff; }

/* ═══ 倒數計時 ════════════════════════════ */
#countdown-wrap {
  height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
  transition: opacity .3s;
}
#countdown-bar {
  height: 100%; background: #ffd700;
  transition: width .5s linear;
}

/* ═══ 對手資訊標籤 ══════════════════════════ */
.opp-tag {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: #aaffcc;
}
.opp-tag.ting::after { content: '聽'; color: #ff4; font-size: 9px; margin-left:2px; }
.opp-flowers-sm { font-size: 10px; color: #88ff44; }

/* ═══ Overlay ═══════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 16px;
}
.overlay.hidden { display: none; }
.overlay-card {
  background: #1a2a3a; border-radius: 18px; padding: 24px 28px;
  text-align: center; min-width: 280px;
}
.overlay-card h2 { color: #ffd700; font-size: 22px; margin-bottom: 12px; }
.overlay-card p  { color: #ccc; font-size: 13px; line-height: 1.6; }
#result-win  { color: #44ff88; font-size: 18px; }
#result-lose { color: #ff6644; font-size: 14px; }
.overlay-btn {
  margin-top: 16px; padding: 10px 28px;
  background: #ffd700; color: #1a0a00;
  border: none; border-radius: 20px;
  font-size: 15px; font-weight: bold; cursor: pointer;
}

/* ═══ 等待畫面 ══════════════════════════════ */
#wait-overlay .overlay-card p { color: #aaffcc; margin-top: 8px; }

/* ═══ 結算各家手牌 ══════════════════════════ */
#result-overlay .overlay-card {
  max-height: 88dvh; overflow-y: auto; padding: 18px 16px 16px;
}
.rt-section-title {
  font-size: 11px; color: #ffdd88; letter-spacing: 2px;
  margin: 12px 0 6px; text-align: left;
}
.rt-player {
  background: rgba(255,255,255,0.06); border-radius: 10px;
  padding: 8px 10px; margin-bottom: 6px;
}
.rt-winner {
  background: rgba(255,215,0,0.12);
  border: 1px solid rgba(255,215,0,0.45);
}
.rt-pname {
  font-size: 12px; color: #aaffcc; margin-bottom: 5px;
  display: flex; align-items: center; gap: 6px; font-weight: bold;
}
.rt-delta {
  font-size: 12px; font-weight: bold; margin-left: auto;
}
.rt-tiles {
  display: flex; flex-wrap: wrap; gap: 2px; align-items: center;
}
.rt-tile {
  display: inline-block; background: #f5edd0; color: #1a1a1a;
  border-radius: 2px; font-size: 9px; padding: 2px 3px;
  font-weight: bold; line-height: 1.2;
}
.rt-meld {
  display: inline-flex; gap: 1px; background: rgba(255,255,255,0.1);
  border-radius: 3px; padding: 1px 2px; margin-right: 4px;
}
.rt-flowers { font-size: 9px; color: #88ff44; margin-top: 3px; }
/* 台數標籤 */
.tai-badge {
  display: inline-block; background: rgba(255,255,255,0.1);
  border-radius: 8px; padding: 2px 8px; margin: 2px;
  font-size: 11px; color: #ccc;
}
.tai-badge b { color: #ffd700; }
#player-list { margin-top: 12px; font-size: 12px; color: #ccc; }
#player-list div { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.08); }

/* ═══ 吃牌選擇 ══════════════════════════════ */
#chow-overlay .chow-opts {
  display: flex; flex-direction: column; gap: 8px; margin-top: 12px;
}
.chow-opt-btn {
  background: rgba(0,136,255,0.3); border: 1px solid #0088ff;
  color: #fff; border-radius: 10px; padding: 8px 16px;
  font-size: 13px; cursor: pointer;
}
.chow-opt-btn:hover { background: rgba(0,136,255,0.5); }

/* ═══ Toast ═══════════════════════════════════ */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #fff; border-radius: 18px;
  padding: 8px 18px; font-size: 13px;
  opacity: 0; pointer-events: none; transition: opacity .3s;
  white-space: nowrap; z-index: 200;
}
#toast.show { opacity: 1; }

/* ═══ 金幣跳字動畫 ══════════════════════════ */
@keyframes coinFloat {
  0%   { opacity: 0; transform: translateX(-50%) translateY(0)   scale(.8); }
  15%  { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1.15); }
  70%  { opacity: 1; transform: translateX(-50%) translateY(-55px) scale(1.05); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-80px) scale(.9); }
}
.coin-delta {
  position: fixed; left: 50%;
  font-size: 26px; font-weight: bold;
  pointer-events: none; z-index: 500;
  white-space: nowrap; letter-spacing: 1px;
  animation: coinFloat 2s ease-out forwards;
}
.coin-delta.positive {
  color: #44ff88;
  text-shadow: 0 2px 12px rgba(68,255,136,.7), 0 0 30px rgba(68,255,136,.3);
}
.coin-delta.negative {
  color: #ff6644;
  text-shadow: 0 2px 12px rgba(255,102,68,.7);
}

/* ═══ 勝利粒子 ═══════════════════════════════ */
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(80px) rotate(720deg) scale(.5); }
}
.confetti-dot {
  position: fixed; width: 8px; height: 8px; border-radius: 2px;
  pointer-events: none; z-index: 499;
  animation: confettiFall 1.2s ease-in forwards;
}
</style>
</head>
<body>

<!-- 頂部狀態列 -->
<div id="top-bar">
  <a href="../index.html" onclick="return confirmLeave()">← 離開</a>
  <div id="room-info">等待加入...</div>
  <div id="wall-count">牌：—</div>
  <button id="sound-toggle" title="音效開關" onclick="toggleSound()">🔊</button>
  <button id="quick-chat-btn" title="快捷語" onclick="toggleQuickChat()">💬</button>
</div>

<!-- 快捷語面板 -->
<div id="quick-chat-panel">
  <div style="font-size:10px;color:#888;padding:0 4px 2px">快捷語</div>
  <button class="qc-btn" onclick="sendQuickChat('gg')">🤝 GG！</button>
  <button class="qc-btn" onclick="sendQuickChat('nice')">👍 好牌！</button>
  <button class="qc-btn" onclick="sendQuickChat('sorry')">🙏 對不起！</button>
  <button class="qc-btn" onclick="sendQuickChat('lol')">😂 哈哈哈！</button>
  <button class="qc-btn" onclick="sendQuickChat('rush')">⏰ 快點！</button>
  <button class="qc-btn" onclick="sendQuickChat('wait')">✋ 等一下！</button>
  <button class="qc-btn" onclick="sendQuickChat('lucky')">🍀 運氣真好！</button>
  <button class="qc-btn" onclick="sendQuickChat('win')">🏆 我要贏了！</button>
</div>

<!-- 主桌面 -->
<div id="game-table">

  <!-- 對家（上方） -->
  <div id="zone-top">
    <div class="opp-tag" id="top-tag">對家 —</div>
    <div id="top-melds" style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center"></div>
    <div id="top-hand" class="opp-hand-row"></div>
  </div>

  <!-- 上家（左側） -->
  <div id="zone-left" class="zone-side">
    <div class="opp-name" id="left-tag">上家 —</div>
    <div id="left-melds" style="display:flex;flex-direction:column;gap:2px"></div>
    <div id="left-hand" class="opp-hand-col"></div>
  </div>

  <!-- 中央棄牌 -->
  <div id="zone-center">
    <div id="last-action-msg"></div>
    <div id="pile-grid"></div>
  </div>

  <!-- 下家（右側） -->
  <div id="zone-right" class="zone-side">
    <div class="opp-name" id="right-tag">下家 —</div>
    <div id="right-melds" style="display:flex;flex-direction:column;gap:2px"></div>
    <div id="right-hand" class="opp-hand-col"></div>
  </div>

  <!-- 自家（底部） -->
  <div id="zone-bottom">
    <div id="my-melds-row"></div>
    <div id="my-flowers-row" style="font-size:11px;color:#88ff44;min-height:16px"></div>
    <div id="my-hand-row"></div>
    <div id="action-bar">
      <button class="action-btn btn-hu"   id="btn-hu"   onclick="doAction('hu')"   style="display:none">🀄 胡</button>
      <button class="action-btn btn-pong" id="btn-pong" onclick="doAction('pong')" style="display:none">碰</button>
      <button class="action-btn btn-kong" id="btn-kong" onclick="doKong()"          style="display:none">槓</button>
      <button class="action-btn btn-chow" id="btn-chow" onclick="showChowMenu()"  style="display:none">吃</button>
      <button class="action-btn btn-pass" id="btn-pass" onclick="doAction('pass')" style="display:none">過</button>
      <button class="action-btn btn-ting" id="btn-ting" onclick="doTing()"         style="display:none">聽牌</button>
    </div>
    <div id="countdown-wrap" style="opacity:0">
      <div id="countdown-bar" style="width:100%"></div>
    </div>
  </div>
</div>

<!-- 等待畫面 -->
<div class="overlay" id="wait-overlay">
  <div class="overlay-card">
    <h2>🀄 等待玩家加入</h2>
    <p>已加入房間，等待湊桌...</p>
    <div id="player-list"></div>
    <button class="overlay-btn" onclick="requestReady()">▶ 馬上開始（補 AI）</button>
  </div>
</div>

<!-- 吃牌選擇 -->
<div class="overlay hidden" id="chow-overlay">
  <div class="overlay-card">
    <h2>選擇吃牌組合</h2>
    <div class="chow-opts" id="chow-opts"></div>
    <button class="overlay-btn" style="background:rgba(255,255,255,.1);color:#ccc;margin-top:8px"
      onclick="doAction('pass')">取消（過）</button>
  </div>
</div>

<!-- 結果畫面 -->
<div class="overlay hidden" id="result-overlay">
  <div class="overlay-card" style="min-width:300px;width:92vw;max-width:420px">
    <h2 id="result-title" style="font-size:18px;margin-bottom:6px">遊戲結束</h2>
    <div id="result-win"     style="font-size:15px;font-weight:bold;margin-bottom:6px"></div>
    <div id="result-details" style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px"></div>
    <div id="result-hands"   style="text-align:left"></div>
    <button class="overlay-btn" onclick="location.href='../index.html'">返回大廳</button>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
import { authManager }  from '../js/auth.js';
import { gameClient }   from '../js/gameClient.js';
import { gameUI }       from '../js/gameUI.js';
import { soundManager } from '../js/soundManager.js';

// 掛到 window 供按鈕使用
window.doAction     = (a, e) => { soundManager.tilePlay(); gameClient.declareAction(a, e); };
window.doKong       = ()     => { soundManager.tilePlay(); gameClient.declareKong(); };
window.showChowMenu = ()     => gameUI.showChowMenu();
window.doTing       = ()     => gameClient.declareTing();
window.requestReady = ()     => gameClient.sendReady();
window.confirmLeave = ()     => confirm('確定離開？進行中的遊戲將由 AI 代打。');
window.toggleSound  = ()     => {
  const on  = soundManager.toggle();
  const btn = document.getElementById('sound-toggle');
  if (btn) { btn.textContent = on ? '🔊' : '🔇'; btn.classList.toggle('muted', !on); }
};

// 音效觸發 hook（透過 gameClient state 變化偵測）
let _prevPending = null, _prevPile = 0, _prevHandCount = 0, _prevPhase = null;
function _soundHook(state) {
  const pileLen = state.pile?.length || 0;

  // 摸牌
  if (state.lastDrawn && state.pendingType === 'discard' &&
      state.pendingType !== _prevPending) {
    soundManager.tileDraw();
  }
  // 出牌（棄牌堆增加）
  if (pileLen > _prevPile && _prevPile > 0) {
    soundManager.tilePlay();
  }
  // 動作出現（action_required for claim）
  if (state.pendingType === 'claim' && _prevPending !== 'claim') {
    // 根據可用動作
    if (state.availableActions?.includes('hu')) soundManager.hu?.();
  }

  _prevPending   = state.pendingType;
  _prevPile      = pileLen;
}

// 監聽 gameEnd 播放勝負音效
function _gameEndSound(result, myUid) {
  if (!result.winner) { soundManager.draw(); return; }
  const isWin = result.winnerUid === myUid || result.winner === _myState?.mySeat;
  if (isWin) soundManager.hu(); else soundManager.opponentHu();
}
let _myState = null;

async function init() {
  const user    = await authManager.getOrCreateGuest();
  const params  = new URLSearchParams(location.search);
  const betKey  = params.get('betKey')   || '10_3';
  const roomType = params.get('roomType') || 'short';
  const roomId  = params.get('roomId')   || null;
  const mode    = params.get('mode')     || null;   // 'dojo'
  const dojoId  = params.get('dojoId')   || null;

  // 道館 / 單機模式：修改離開按鈕文字
  if (mode === 'dojo' && dojoId) {
    const backLink = document.querySelector('#top-bar a');
    if (backLink) {
      backLink.href = 'javascript:void(0)';
      backLink.textContent = '← 道館';
    }
  } else if (mode === 'solo') {
    const backLink = document.querySelector('#top-bar a');
    if (backLink) backLink.href = 'solo.html';
  }

  gameClient.init({
    user, betKey, roomType, roomId,
    dojoMode: mode === 'dojo',
    dojoId,
    onStateChange: (state) => {
      _myState = state;
      _soundHook(state);
      gameUI.render(state);
    },
    onToast: (msg, ms) => gameUI.toast(msg, ms),
    // 道館模式：遊戲結束後帶結果跳回道館頁
    onGameEnd: (result) => {
      _gameEndSound(result, user.uid);
      if (mode !== 'dojo' || !dojoId) return;
      const isWin = result.winner && result.winnerUid === user.uid;
      const outcome = isWin ? 'win' : 'lose';
      setTimeout(() => {
        location.href = `dojo.html?dojoResult=${outcome}&dojoId=${dojoId}`;
      }, 4000);  // 讓結算畫面顯示 4 秒
    },
  });

  // 道館 / 單機模式：自動補 AI 開始
  if (mode === 'dojo' || mode === 'solo') {
    setTimeout(() => gameClient.sendReady(), 800);
  }

  // ── Socket 事件：快捷語 + 成就 + 金幣結算 ──
  const socket = gameClient.getSocket?.();
  if (socket) {
    socket.on('game:quick_chat', _onQuickChat);
    socket.on('achievement:unlocked', ({ achievements }) => {
      if (!Array.isArray(achievements)) return;
      achievements.forEach((ach, i) => {
        setTimeout(() => _showAchBanner(ach), i * 4000);
      });
    });

    // 金幣結算跳字動畫
    socket.on('game:coin_settled', ({ coinDeltas }) => {
      const myDelta = coinDeltas?.[user.uid];
      if (myDelta !== undefined && myDelta !== 0) {
        _showCoinDelta(myDelta);
        if (myDelta > 0) _spawnConfetti();
      }
    });
  }
}
init();

// ── 快捷語 ────────────────────────────────
let _qcOpen = false;
window.toggleQuickChat = () => {
  _qcOpen = !_qcOpen;
  const panel = document.getElementById('quick-chat-panel');
  panel.classList.toggle('open', _qcOpen);
  document.getElementById('quick-chat-btn').style.color = _qcOpen ? '#ffd700' : '#aaa';
};
window.sendQuickChat = (quickId) => {
  const socket = gameClient.getSocket?.();
  const roomId = gameClient.getRoomId?.();
  if (!socket || !roomId) return;
  socket.emit('game:quick_chat', { roomId, quickId });
  _qcOpen = false;
  document.getElementById('quick-chat-panel').classList.remove('open');
  document.getElementById('quick-chat-btn').style.color = '#aaa';
};

// 收到快捷語 → 在對應座位顯示氣泡
function _onQuickChat({ uid: senderUid, username, emoji, text }) {
  // 找出此玩家在畫面中的對應元素（用 data-uid 或 seat 方向）
  const state = _myState;
  if (!state) return;
  let targetEl = null;
  if (senderUid === state.myUid) {
    targetEl = document.getElementById('my-hand-row');
  } else {
    // 嘗試找對手的名字列
    const players = state.players || [];
    const idx = players.findIndex(p => p.uid === senderUid);
    if (idx >= 0) {
      const seatEls = ['player-top','player-left','player-right'];
      targetEl = document.getElementById(seatEls[idx % seatEls.length]);
    }
  }
  // 建立氣泡
  const bubble = document.createElement('div');
  bubble.className = 'qc-bubble';
  bubble.textContent = `${emoji} ${text}`;
  const base = document.getElementById('game-table') || document.body;
  base.style.position = 'relative';
  base.appendChild(bubble);
  // 定位：置中於 targetEl 上方
  if (targetEl) {
    const tr = targetEl.getBoundingClientRect();
    const br = base.getBoundingClientRect();
    bubble.style.left = (tr.left - br.left + tr.width / 2 - 60) + 'px';
    bubble.style.top  = (tr.top  - br.top  - 36) + 'px';
  } else {
    bubble.style.left = '50%'; bubble.style.top = '30%';
    bubble.style.transform = 'translateX(-50%)';
  }
  setTimeout(() => bubble.remove(), 2500);
}

// ── 成就解鎖橫幅 ────────────────────────
function _showAchBanner(ach) {
  let banner = document.getElementById('ach-banner-game');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'ach-banner-game';
    banner.style.cssText = `
      position:fixed; top:-80px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#ffd700,#ff9900); color:#1a0a00;
      border-radius:16px; padding:12px 20px; font-size:13px; font-weight:bold;
      box-shadow:0 4px 20px rgba(255,215,0,0.4); z-index:999; white-space:nowrap;
      transition:top .4s cubic-bezier(.34,1.56,.64,1);
    `;
    document.body.appendChild(banner);
  }
  banner.textContent = `🏆 成就解鎖：${ach.icon} ${ach.name}！${ach.reward > 0 ? `+${ach.reward}💰` : ''}`;
  banner.style.top = '60px';
  setTimeout(() => { banner.style.top = '-80px'; }, 3500);
}

// ── 金幣跳字動畫 ─────────────────────────
function _showCoinDelta(delta) {
  const el = document.createElement('div');
  el.className = `coin-delta ${delta > 0 ? 'positive' : 'negative'}`;
  el.textContent = `${delta > 0 ? '+' : ''}${delta.toLocaleString()} 💰`;
  el.style.top = '38%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// 勝利粒子（只有勝者才跑）
function _spawnConfetti() {
  const colors = ['#ffd700','#ff4488','#44ff88','#4488ff','#ff8844','#ffffff'];
  for (let i = 0; i < 24; i++) {
    setTimeout(() => {
      const dot = document.createElement('div');
      dot.className = 'confetti-dot';
      dot.style.background = colors[i % colors.length];
      dot.style.left  = (20 + Math.random() * 60) + '%';
      dot.style.top   = (10 + Math.random() * 50) + '%';
      dot.style.animationDuration = (.8 + Math.random() * .8) + 's';
      dot.style.animationDelay   = (Math.random() * .3) + 's';
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 1400);
    }, i * 30);
  }
}

// 手牌點選音效
document.getElementById('my-hand-row')?.addEventListener('click', () => {
  soundManager.tileClick();
}, { capture: true });

// Service Worker 註冊
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .catch(() => {/* 離線 fallback 失敗不影響遊戲 */});
}
</script>
