<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>排行榜</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #1a0a3a 0%, #0a3a1a 100%);
  font-family: 'Noto Serif TC', serif; color: #fff;
  min-height: 100dvh; padding: 0 0 40px;
}
.top-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: rgba(0,0,0,0.3);
  margin-bottom: 4px;
}
.top-bar a { color: #ffd700; font-size: 13px; text-decoration: none; }
.top-bar h1 { flex: 1; text-align: center; font-size: 17px; color: #ffd700; }

.tab-bar {
  display: flex; border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.2);
}
.tab-btn {
  flex: 1; padding: 10px; font-size: 13px; text-align: center;
  cursor: pointer; color: #888; background: none; border: none;
  border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
}
.tab-btn.active { color: #ffd700; border-bottom-color: #ffd700; }

.content { padding: 12px; }

/* ── 頂部三強 ── */
.podium {
  display: flex; justify-content: center; align-items: flex-end;
  gap: 8px; margin: 16px 0 20px; height: 110px;
}
.podium-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; flex: 1; max-width: 110px;
}
.podium-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,215,0,0.4);
}
.podium-name { font-size: 11px; color: #eee; text-align: center; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.podium-score { font-size: 13px; font-weight: bold; color: #ffd700; }
.podium-block {
  width: 100%; border-radius: 6px 6px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: bold;
}
.rank-1 .podium-block { height: 60px; background: linear-gradient(180deg, #ffd700, #cc9900); color: #1a0a00; }
.rank-2 .podium-block { height: 44px; background: linear-gradient(180deg, #aaa, #777); color: #fff; }
.rank-3 .podium-block { height: 32px; background: linear-gradient(180deg, #cd7f32, #8b4513); color: #fff; }

/* ── 排行列表 ── */
.rank-list { display: flex; flex-direction: column; gap: 6px; }
.rank-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.07); border-radius: 12px;
  padding: 10px 12px;
}
.rank-num {
  width: 24px; text-align: center; font-size: 13px;
  font-weight: bold; color: #aaa; flex-shrink: 0;
}
.rank-num.top3 { color: #ffd700; font-size: 16px; }
.rank-avatar { font-size: 22px; flex-shrink: 0; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-sub  { font-size: 10px; color: #aaa; margin-top: 2px; }
.rank-score { text-align: right; flex-shrink: 0; }
.rank-score .val { font-size: 16px; font-weight: bold; color: #ffd700; }
.rank-score .lbl { font-size: 9px; color: #aaa; }

/* ── 自己的排名 ── */
.my-rank-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(26,10,58,0.95); border-top: 1px solid rgba(255,215,0,0.3);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  font-size: 13px;
}
.my-rank-bar .label { color: #aaa; }
.my-rank-bar .rank  { color: #ffd700; font-weight: bold; font-size: 16px; }
.my-rank-bar .name  { flex: 1; }
.my-rank-bar .score { color: #ffd700; font-weight: bold; }

/* ── 空狀態 ── */
.empty-state {
  text-align: center; padding: 40px 20px; color: #888;
}
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }
.empty-state .title { font-size: 14px; color: #aaa; margin-bottom: 4px; }
.empty-state .sub   { font-size: 12px; color: #666; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html">← 返回</a>
  <h1>🏆 排行榜</h1>
  <span style="width:40px"></span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('wins')">⚔️ 勝場榜</button>
  <button class="tab-btn"        onclick="switchTab('coins')">💰 金幣榜</button>
  <button class="tab-btn"        onclick="switchTab('rank')">🏯 段位榜</button>
</div>

<div class="content">
  <!-- 頂部三強 -->
  <div class="podium" id="podium"></div>
  <!-- 4名以後 -->
  <div class="rank-list" id="rank-list">
    <div style="text-align:center;color:#aaa;padding:20px">載入中...</div>
  </div>
</div>

<!-- 自己的排名 -->
<div class="my-rank-bar" id="my-rank-bar" style="display:none">
  <span class="label">我的排名</span>
  <span class="rank" id="my-rank-num">—</span>
  <span class="name" id="my-rank-name"></span>
  <span class="score" id="my-rank-score"></span>
</div>

<script type="module">
import { authManager } from '../js/auth.js';
import toast           from '../js/toast.js';

const API = '/api';
let _currentType = 'wins';
let _myUid = '';

const AVATARS = ['🐉','🦁','🐯','🐻','🦊','🐼','🐨','🦅','🦋','🌟'];
function avatar(uid) {
  let h = 0;
  for (const c of uid) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AVATARS[h % AVATARS.length];
}

function emptyState(icon, title, sub) {
  return `<div class="empty-state"><div class="icon">${icon}</div><div class="title">${title}</div><div class="sub">${sub}</div></div>`;
}

window.switchTab = function(type) {
  _currentType = type;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['wins','coins','rank'][i] === type);
  });
  if (type === 'rank') loadRankLeaderboard();
  else loadLeaderboard(type);
};

async function loadLeaderboard(type) {
  document.getElementById('rank-list').innerHTML =
    '<div style="text-align:center;color:#aaa;padding:20px">載入中...</div>';
  document.getElementById('podium').innerHTML = '';

  const res = await fetch(`${API}/leaderboard?type=${type}&limit=20`);
  if (!res.ok) { toast.error('排行榜載入失敗'); return; }
  const { list } = await res.json();

  if (!list.length) {
    document.getElementById('rank-list').innerHTML =
      emptyState('📊', '尚無排行資料', '快去對局，成為第一名！');
    return;
  }

  renderPodium(list.slice(0, 3), type);
  renderList(list.slice(3), type, 4);
  renderMyRank(list, type);
}

function scoreVal(row, type) {
  return type === 'coins' ? row.coins : row.total_wins;
}
function scoreLabel(type) {
  return type === 'coins' ? '金幣' : '勝場';
}

function renderPodium(top3, type) {
  const order = [1, 0, 2]; // 銀、金、銅位置
  const podium = document.getElementById('podium');
  podium.innerHTML = '';

  order.forEach(idx => {
    const row = top3[idx];
    const rank = idx + 1;
    if (!row) { podium.appendChild(document.createElement('div')); return; }

    const div = document.createElement('div');
    div.className = `podium-item rank-${rank}`;
    div.innerHTML = `
      <div class="podium-avatar">${avatar(row.uid)}</div>
      <div class="podium-name">${row.username}</div>
      <div class="podium-score">${scoreVal(row, type).toLocaleString()}</div>
      <div class="podium-block">${rank}</div>
    `;
    podium.appendChild(div);
  });
}

function renderList(rows, type, startRank) {
  const el = document.getElementById('rank-list');
  el.innerHTML = '';
  if (!rows.length) return;

  rows.forEach((row, i) => {
    const rank = startRank + i;
    const isMe = row.uid === _myUid;
    const div  = document.createElement('div');
    div.className = 'rank-row';
    if (isMe) div.style.background = 'rgba(255,215,0,0.12)';
    div.innerHTML = `
      <div class="rank-num">${rank}</div>
      <div class="rank-avatar">${avatar(row.uid)}</div>
      <div class="rank-info">
        <div class="rank-name">${row.username}${isMe ? ' 👈' : ''}</div>
        <div class="rank-sub">LV${row.game_level} · VIP${row.vip_level}${
          type === 'wins' ? ` · 勝率 ${row.win_rate}` : ''
        }</div>
      </div>
      <div class="rank-score">
        <div class="val">${scoreVal(row, type).toLocaleString()}</div>
        <div class="lbl">${scoreLabel(type)}</div>
      </div>
    `;
    el.appendChild(div);
  });
}

function renderMyRank(list, type) {
  const idx = list.findIndex(r => r.uid === _myUid);
  const bar = document.getElementById('my-rank-bar');
  if (idx < 0) { bar.style.display = 'none'; return; }
  const row = list[idx];
  document.getElementById('my-rank-num').textContent   = `#${idx + 1}`;
  document.getElementById('my-rank-name').textContent  = row.username;
  document.getElementById('my-rank-score').textContent =
    `${scoreVal(row, type).toLocaleString()} ${scoreLabel(type)}`;
  bar.style.display = 'flex';
}

// ── 段位榜 ──────────────────────────────
async function loadRankLeaderboard() {
  document.getElementById('rank-list').innerHTML =
    '<div style="text-align:center;color:#aaa;padding:20px">載入中...</div>';
  document.getElementById('podium').innerHTML = '';

  const res = await fetch(`${API}/rank/leaderboard?limit=20`);
  if (!res.ok) { toast.error('段位榜載入失敗'); return; }
  const { list } = await res.json();

  if (!list.length) {
    document.getElementById('rank-list').innerHTML =
      emptyState('🏯', '本賽季尚無段位記錄', '完成排位賽後即可上榜');
    return;
  }

  renderRankPodium(list.slice(0, 3));
  renderRankList(list.slice(3), 4);
  renderMyRankBar(list);
}

function renderRankPodium(top3) {
  const order  = [1, 0, 2];
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  order.forEach(idx => {
    const row  = top3[idx];
    const rank = idx + 1;
    if (!row) { podium.appendChild(document.createElement('div')); return; }
    const div = document.createElement('div');
    div.className = `podium-item rank-${rank}`;
    div.innerHTML = `
      <div class="podium-avatar">${row.emoji}</div>
      <div class="podium-name">${row.username}</div>
      <div class="podium-score">${row.rp} RP</div>
      <div class="podium-block">${rank}</div>
    `;
    podium.appendChild(div);
  });
}

function renderRankList(rows, startRank) {
  const el = document.getElementById('rank-list');
  el.innerHTML = '';
  rows.forEach((row, i) => {
    const rank = startRank + i;
    const isMe = row.uid === _myUid;
    const div  = document.createElement('div');
    div.className = 'rank-row';
    if (isMe) div.style.background = 'rgba(255,215,0,0.12)';
    div.innerHTML = `
      <div class="rank-num">${rank}</div>
      <div class="rank-avatar">${row.emoji}</div>
      <div class="rank-info">
        <div class="rank-name">${row.username}${isMe ? ' 👈' : ''}</div>
        <div class="rank-sub">${row.name} · ${row.wins}勝 ${row.losses}敗</div>
      </div>
      <div class="rank-score">
        <div class="val">${row.rp}</div>
        <div class="lbl">RP</div>
      </div>
    `;
    el.appendChild(div);
  });
}

function renderMyRankBar(list) {
  const idx = list.findIndex(r => r.uid === _myUid);
  const bar = document.getElementById('my-rank-bar');
  if (idx < 0) { bar.style.display = 'none'; return; }
  const row = list[idx];
  document.getElementById('my-rank-num').textContent   = `#${idx + 1}`;
  document.getElementById('my-rank-name').textContent  = `${row.emoji} ${row.name}`;
  document.getElementById('my-rank-score').textContent = `${row.rp} RP`;
  bar.style.display = 'flex';
}

async function init() {
  const user = await authManager.getOrCreateGuest();
  _myUid = user.uid;
  await loadLeaderboard('wins');
}
init();
</script>
</body>
</html>
