<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>道館挑戰</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #1a0a3a 0%, #0a3a1a 100%);
  font-family: 'Noto Serif TC', serif; color: #fff;
  min-height: 100dvh; padding: 0 0 40px;
}
.top-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: rgba(0,0,0,0.3);
  margin-bottom: 4px;
}
.top-bar a { color: #ffd700; font-size: 13px; text-decoration: none; }
.top-bar h1 { flex: 1; text-align: center; font-size: 17px; color: #ffd700; }

.content { padding: 12px; }

/* ── 道館卡片 ── */
.dojo-path {
  position: relative;
  display: flex; flex-direction: column; gap: 0; align-items: center;
}

/* 連線（道路） */
.dojo-connector {
  width: 3px; height: 24px;
  background: linear-gradient(to bottom, #ffd700 0%, rgba(255,215,0,.3) 100%);
}
.dojo-connector.locked { background: rgba(255,255,255,.1); }

.dojo-card {
  width: 100%; max-width: 400px;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,215,0,0.25);
  border-radius: 18px; padding: 16px;
  transition: background .15s;
}
.dojo-card.cleared  { border-color: #44ff88; background: rgba(68,255,136,0.07); }
.dojo-card.available { border-color: #ffd700; }
.dojo-card.locked   { border-color: rgba(255,255,255,.1); opacity: 0.55; }

.dojo-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dojo-status-icon { font-size: 24px; flex-shrink: 0; }
.dojo-name { font-size: 16px; font-weight: bold; }
.dojo-name small { display: block; font-size: 11px; color: #aaa; font-weight: normal; margin-top: 2px; }

.dojo-prog-wrap {
  height: 8px; background: rgba(255,255,255,0.1);
  border-radius: 5px; overflow: hidden; margin-bottom: 6px;
}
.dojo-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffd700, #ff9900);
  border-radius: 5px; transition: width .5s;
}
.dojo-prog-fill.cleared { background: linear-gradient(90deg, #44ff88, #00cc66); }

.dojo-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: #aaa; margin-top: 4px;
}
.dojo-reward { color: #ffd700; font-weight: bold; }

.challenge-btn {
  padding: 9px 22px; background: linear-gradient(135deg, #ffd700, #ff9900);
  color: #1a0a00; border: none; border-radius: 14px;
  font-size: 13px; font-weight: bold; cursor: pointer;
  transition: opacity .15s;
}
.challenge-btn:active { opacity: .8; }
.challenge-btn:disabled { background: #333; color: #666; cursor: default; }
.cleared-badge {
  display: inline-flex; align-items: center; gap: 4px;
  color: #44ff88; font-size: 13px; font-weight: bold;
}

/* ── 挑戰結果彈窗 ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
.overlay.hidden { display: none; }
.result-card {
  background: #1a2a3a; border-radius: 18px; padding: 28px 24px;
  text-align: center; min-width: 280px;
}
.result-card h2 { color: #ffd700; font-size: 22px; margin-bottom: 12px; }
.result-card p  { color: #ccc; font-size: 14px; line-height: 1.8; }
.result-card .reward-line { color: #44ff88; font-size: 18px; margin: 10px 0; }
.overlay-btn {
  margin-top: 16px; padding: 10px 28px;
  background: #ffd700; color: #1a0a00;
  border: none; border-radius: 20px;
  font-size: 15px; font-weight: bold; cursor: pointer;
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #fff; border-radius: 20px;
  padding: 9px 18px; font-size: 13px; opacity: 0; pointer-events: none;
  transition: opacity .3s; z-index: 200; white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html">← 返回</a>
  <h1>⚔️ 道館挑戰</h1>
  <span style="font-size:11px;color:#aaa">擊敗 AI 晉升</span>
</div>

<div class="content">
  <div class="dojo-path" id="dojo-path">
    <div style="color:#aaa;font-size:13px;text-align:center;padding:20px">載入中...</div>
  </div>
</div>

<!-- 挑戰結果彈窗 -->
<div class="overlay hidden" id="result-overlay">
  <div class="result-card">
    <h2 id="result-title">🎉 道館通關！</h2>
    <p id="result-body"></p>
    <div class="reward-line" id="result-reward"></div>
    <button class="overlay-btn" onclick="closeResult()">繼續挑戰</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { authManager } from '../js/auth.js';

const API = '/api';
let _token  = '';
let _dojos  = [];

function headers() {
  return { 'Content-Type': 'application/json', Authorization: `Bearer ${_token}` };
}
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ── 載入道館 ─────────────────────────────
async function loadDojos() {
  const res   = await fetch(`${API}/dojo`, { headers: headers() });
  if (!res.ok) return;
  const { dojos } = await res.json();
  _dojos = dojos;
  renderDojos(dojos);
}

function renderDojos(dojos) {
  const container = document.getElementById('dojo-path');
  container.innerHTML = '';

  const icons = { cleared: '✅', available: '⚔️', locked: '🔒', in_progress: '🔥' };
  const COLORS = { cleared: 'cleared', available: 'available', in_progress: 'available', locked: 'locked' };

  dojos.forEach((dojo, idx) => {
    // 連線
    if (idx > 0) {
      const conn = document.createElement('div');
      conn.className = `dojo-connector ${dojo.status === 'locked' ? 'locked' : ''}`;
      container.appendChild(conn);
    }

    const card = document.createElement('div');
    card.className = `dojo-card ${COLORS[dojo.status] || 'locked'}`;
    const isLocked    = dojo.status === 'locked';
    const isCleared   = dojo.status === 'cleared';
    const canChallenge = !isLocked && !isCleared;
    const inProgress  = dojo.status === 'in_progress';

    card.innerHTML = `
      <div class="dojo-header">
        <div class="dojo-status-icon">${icons[dojo.status] || '🔒'}</div>
        <div>
          <div class="dojo-name">
            ${dojo.name}
            <small>${dojo.desc}</small>
          </div>
        </div>
      </div>
      <div class="dojo-prog-wrap">
        <div class="dojo-prog-fill ${isCleared ? 'cleared' : ''}"
          style="width:${isCleared ? 100 : dojo.pct}%"></div>
      </div>
      <div class="dojo-footer">
        <span>
          ${isCleared ? '已通關' : `進度：${dojo.wins} / ${dojo.requiredWins} 勝`}
        </span>
        <span class="dojo-reward">通關獎勵：💰${dojo.reward.toLocaleString()}</span>
      </div>
      <div style="margin-top:10px;text-align:right">
        ${isCleared
          ? '<span class="cleared-badge">✅ 已通關</span>'
          : isLocked
            ? '<button class="challenge-btn" disabled>🔒 未解鎖</button>'
            : `<button class="challenge-btn" onclick="startChallenge('${dojo.id}')">
                ${inProgress ? '🔥 繼續挑戰' : '⚔️ 開始挑戰'}
              </button>`
        }
      </div>
    `;
    container.appendChild(card);
  });
}

// ── 開始挑戰 ─────────────────────────────
window.startChallenge = function(dojoId) {
  // 跳到遊戲頁面，傳入 dojo 參數（自動填充 AI，short 桌）
  location.href = `game.html?betKey=10_3&roomType=short&mode=dojo&dojoId=${dojoId}`;
};

// ── 遊戲結束後由遊戲頁呼叫 ─────────────────
// 若 URL 帶 ?dojoResult=win&dojoId=xxx 則觸發更新
async function checkDojoResult() {
  const params = new URLSearchParams(location.search);
  const result = params.get('dojoResult');
  const dojoId = params.get('dojoId');
  if (!result || !dojoId) return;

  // 清除 URL 參數
  history.replaceState({}, '', location.pathname);

  if (result !== 'win') return;

  const res  = await fetch(`${API}/dojo/win`, {
    method: 'POST', headers: headers(),
    body: JSON.stringify({ dojoId }),
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error); return; }

  await loadDojos();  // 重新載入

  const overlay   = document.getElementById('result-overlay');
  const titleEl   = document.getElementById('result-title');
  const bodyEl    = document.getElementById('result-body');
  const rewardEl  = document.getElementById('result-reward');

  const dojo = _dojos.find(d => d.id === dojoId);
  if (data.cleared) {
    titleEl.textContent = `🎉 ${dojo?.name || dojoId} 通關！`;
    bodyEl.textContent  = `你已連勝 ${data.wins} 場，成功征服此道館！`;
    rewardEl.textContent = `獎勵：+${data.reward.toLocaleString()} 金幣`;
  } else {
    titleEl.textContent = `⚔️ 繼續加油！`;
    bodyEl.textContent  = `進度：${data.wins} / ${data.required} 勝`;
    rewardEl.textContent = '';
  }
  overlay.classList.remove('hidden');
};

window.closeResult = () => {
  document.getElementById('result-overlay').classList.add('hidden');
};

// ── 初始化 ────────────────────────────────
async function init() {
  const user = await authManager.getOrCreateGuest();
  _token = authManager.getToken();
  await checkDojoResult();
  await loadDojos();
}
init();
</script>
</body>
</html>
