<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>重設密碼 — 月見麻將</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #1a0a3a 0%, #0a3a1a 100%);
  font-family: 'Noto Serif TC', serif; color: #fff;
  min-height: 100dvh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,215,0,0.25);
  border-radius: 20px; padding: 32px 24px;
  width: 100%; max-width: 360px;
  text-align: center;
}
h1 { color: #ffd700; font-size: 20px; margin-bottom: 8px; }
.sub { color: #aaa; font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
.inp {
  width: 100%; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff; border-radius: 10px; padding: 12px 14px;
  font-size: 14px; outline: none; margin-bottom: 12px;
}
.inp:focus { border-color: #ffd700; }
.btn {
  width: 100%; padding: 13px; border: none; border-radius: 14px;
  font-size: 15px; font-weight: bold; cursor: pointer;
  background: linear-gradient(135deg, #ffd700, #ff9900);
  color: #1a0a00; margin-top: 4px;
}
.btn:active { opacity: 0.85; }
.btn:disabled { background: #444; color: #777; cursor: default; }
.msg { margin-top: 14px; font-size: 13px; line-height: 1.5; min-height: 20px; }
.msg.ok  { color: #aaffcc; }
.msg.err { color: #ff8888; }
.back { display: block; margin-top: 20px; color: #ffd700; font-size: 13px; text-decoration: none; }
.back:hover { text-decoration: underline; }

/* forgot flow */
#forgot-form, #reset-form, #done-screen { display: none; }
#forgot-form.show, #reset-form.show, #done-screen.show { display: block; }
</style>
</head>
<body>

<div class="card">
  <div style="font-size:36px;margin-bottom:12px">🔐</div>

  <!-- 忘記密碼：輸入 Email -->
  <div id="forgot-form">
    <h1>忘記密碼</h1>
    <div class="sub">輸入您的帳號 Email，<br>我們將傳送重設連結給您。</div>
    <input class="inp" id="forgot-email" type="email" placeholder="帳號 Email"
      onkeydown="if(event.key==='Enter') sendForgot()">
    <button class="btn" id="forgot-btn" onclick="sendForgot()">📧 發送重設連結</button>
    <div class="msg" id="forgot-msg"></div>
    <a class="back" href="../index.html">← 返回首頁</a>
  </div>

  <!-- 重設密碼：輸入新密碼 -->
  <div id="reset-form">
    <h1>重設密碼</h1>
    <div class="sub">請輸入您的新密碼（至少 6 位）</div>
    <input class="inp" id="new-pass"     type="password" placeholder="新密碼（至少 6 位）"
      onkeydown="if(event.key==='Enter') doReset()">
    <input class="inp" id="confirm-pass" type="password" placeholder="再次確認新密碼"
      onkeydown="if(event.key==='Enter') doReset()">
    <button class="btn" id="reset-btn" onclick="doReset()">🔑 確認重設密碼</button>
    <div class="msg" id="reset-msg"></div>
  </div>

  <!-- 完成畫面 -->
  <div id="done-screen">
    <h1 style="color:#aaffcc">✅ 密碼已重設</h1>
    <div class="sub" style="margin-top:12px">您的密碼已成功更新，<br>請使用新密碼登入。</div>
    <a class="btn" href="../index.html" style="display:block;margin-top:20px;text-decoration:none;line-height:1.8">
      🀄 返回首頁登入
    </a>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');

function show(id) {
  ['forgot-form','reset-form','done-screen'].forEach(x =>
    document.getElementById(x).classList.remove('show')
  );
  document.getElementById(id).classList.add('show');
}

// 決定初始畫面
if (token) {
  show('reset-form');
} else {
  show('forgot-form');
}

// ── 忘記密碼：送出 Email ─────────────────
async function sendForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  const msgEl = document.getElementById('forgot-msg');
  const btn   = document.getElementById('forgot-btn');
  if (!email) { setMsg('forgot-msg', '請輸入 Email', 'err'); return; }

  btn.disabled = true;
  btn.textContent = '發送中…';
  msgEl.className = 'msg';
  msgEl.textContent = '';

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok) { setMsg('forgot-msg', data.error || '發送失敗', 'err'); return; }

    setMsg('forgot-msg', '✅ 已發送！請查收您的 Email（30 分鐘內有效）', 'ok');

    // 開發模式：顯示連結
    if (data.reset_url) {
      const link = document.createElement('a');
      link.href  = data.reset_url;
      link.style = 'display:block;margin-top:8px;font-size:11px;color:#aaffcc;word-break:break-all';
      link.textContent = '[Dev] ' + data.reset_url;
      document.getElementById('forgot-msg').appendChild(link);
    }
  } catch (e) {
    setMsg('forgot-msg', '網路錯誤：' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '📧 發送重設連結';
  }
}

// ── 重設密碼 ─────────────────────────────
async function doReset() {
  const pass    = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const btn     = document.getElementById('reset-btn');

  if (pass.length < 6)  { setMsg('reset-msg', '密碼至少 6 位', 'err'); return; }
  if (pass !== confirm) { setMsg('reset-msg', '兩次密碼不一致', 'err'); return; }

  btn.disabled = true;
  btn.textContent = '重設中…';

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) { setMsg('reset-msg', data.error || '重設失敗', 'err'); btn.disabled = false; btn.textContent = '🔑 確認重設密碼'; return; }
    show('done-screen');
  } catch (e) {
    setMsg('reset-msg', '網路錯誤：' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '🔑 確認重設密碼';
  }
}

function setMsg(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent  = text;
  el.className    = 'msg ' + cls;
}
</script>
</body>
</html>
