<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0a3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="月見麻將">
<link rel="manifest" href="manifest.json">
<script src="js/errorHandler.js"></script>
<title>月見麻將</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #1a0a3a 0%, #0a3a1a 100%);
  font-family: 'Noto Serif TC', serif;
  min-height: 100dvh; color: #fff;
  display: flex; flex-direction: column;
  align-items: center; padding: 20px 12px;
  user-select: none;
}
header { text-align: center; margin-bottom: 24px; }
header h1 { color: #ffd700; font-size: 26px; letter-spacing: 4px; }
header .sub { color: #aaffcc; font-size: 12px; margin-top: 4px; }

.coin-bar {
  background: rgba(0,0,0,0.35); border-radius: 20px;
  padding: 6px 20px; margin-bottom: 20px;
  font-size: 14px; display: flex; gap: 16px;
}
.coin-bar span { color: #ffd700; font-weight: bold; }

.section-title {
  color: #ffdd88; font-size: 13px; letter-spacing: 2px;
  margin-bottom: 8px; width: 100%; max-width: 400px;
}

.room-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px;
}
.room-card {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,215,0,0.3);
  border-radius: 14px; padding: 14px 12px;
  text-align: center; cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
}
.room-card:active { transform: scale(0.96); }
.room-card:hover { background: rgba(255,255,255,0.16); border-color: #ffd700; }
.room-card .bet { color: #ffd700; font-size: 18px; font-weight: bold; margin-bottom: 4px; }
.room-card .desc { color: #aaa; font-size: 11px; }
.room-card .badge {
  display: inline-block; background: #ff6600;
  color: #fff; font-size: 10px; padding: 1px 6px;
  border-radius: 8px; margin-top: 4px;
}

.btn-solo {
  width: 100%; max-width: 400px;
  background: linear-gradient(135deg, #ffd700, #ff9900);
  color: #1a0a00; font-size: 15px; font-weight: bold;
  border: none; border-radius: 24px; padding: 13px;
  cursor: pointer; letter-spacing: 2px; margin-bottom: 10px;
}
.btn-solo:active { opacity: 0.85; }

.footer { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 20px; }

/* ── 公告橫幅 ── */
#announce-bar {
  width: 100%; max-width: 400px; margin-bottom: 12px;
  display: none; flex-direction: column; gap: 6px;
}
.ann-card {
  border-radius: 12px; padding: 10px 14px;
  font-size: 12px; line-height: 1.6; display: flex; gap: 10px; align-items: flex-start;
}
.ann-card.info  { background: rgba(68,170,255,0.12); border: 1px solid rgba(68,170,255,0.3); }
.ann-card.warn  { background: rgba(255,170,0,0.12);  border: 1px solid rgba(255,170,0,0.35); }
.ann-card.event { background: rgba(255,68,170,0.12); border: 1px solid rgba(255,68,170,0.3); }
.ann-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.ann-body .ann-title { font-weight: bold; color: #fff; margin-bottom: 2px; }
.ann-body .ann-text  { color: #bbb; }
</style>
</head>
<body>

<header>
  <h1>🀄 月見麻將</h1>
  <div class="sub">台灣16張麻將</div>
</header>

<div class="coin-bar" onclick="location.href='pages/profile.html'" style="cursor:pointer">
  🪙 <span id="coinDisplay">1,000</span>
  &nbsp;·&nbsp;
  💎 <span id="diamondDisplay">0</span>
  &nbsp;·&nbsp;
  👑 VIP <span id="vipDisplay">0</span>
  &nbsp;·&nbsp;
  <span style="color:#aaffcc;font-size:12px" id="nameDisplay">載入中</span>
</div>
<div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:8px;margin-top:-12px">
  🟢 在線 <span id="onlineCount">—</span> 人
</div>

<!-- 公告橫幅 -->
<div id="announce-bar"></div>

<div class="section-title">大眾廳（1圈）</div>
<div class="room-grid">
  <div class="room-card" onclick="quickJoin('100_30p','public')">
    <div class="bet">100/30</div>
    <div class="desc">一般台式</div>
  </div>
  <div class="room-card" onclick="quickJoin('1000_300d','diamond')">
    <div class="bet">1000/300</div>
    <div class="desc">鑽石廳</div>
    <div class="badge">VIP1+</div>
  </div>
</div>

<div class="section-title">短打廳（1/4圈）</div>
<div class="room-grid">
  <div class="room-card" onclick="quickJoin('10_3','short')">
    <div class="bet">10/3</div>
    <div class="desc">新手練習</div>
  </div>
  <div class="room-card" onclick="quickJoin('100_30','short')">
    <div class="bet">100/30</div>
    <div class="desc">短打</div>
  </div>
</div>

<!-- 單機模式入口（沿用原有遊戲） -->
<button class="btn-solo" onclick="location.href='pages/solo.html'">▶ 單機模式（vs AI）</button>

<!-- 私人房間 -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px;margin-bottom:12px">
  <button class="btn-solo" style="background:linear-gradient(135deg,#3a1a6a,#6622cc);margin-bottom:0;font-size:12px"
    onclick="createPrivateRoom()">🔒 建立私人房</button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#1a3a6a,#2266cc);margin-bottom:0;font-size:12px"
    onclick="joinByCode()">🔑 輸入邀請碼</button>
</div>

<!-- 社交 / 道館 / 商城入口 -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px;margin-bottom:10px">
  <button class="btn-solo" style="background:linear-gradient(135deg,#5522cc,#8844ff);margin-bottom:0"
    onclick="location.href='pages/social.html'">
    📋 任務 &amp; 社交
  </button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#1a6a2a,#2a9a3a);margin-bottom:0"
    onclick="location.href='pages/dojo.html'">
    ⚔️ 道館挑戰
  </button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#cc5500,#ff8800);margin-bottom:0;grid-column:1/-1"
    onclick="location.href='pages/shop.html'">
    💎 金幣商城
  </button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#1a4a8a,#2266cc);margin-bottom:0;grid-column:1/-1"
    onclick="location.href='pages/leaderboard.html'">
    🏆 排行榜
  </button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#6a1a1a,#cc3300);margin-bottom:0;grid-column:1/-1"
    onclick="location.href='pages/events.html'">
    🎉 活動 & 推薦碼
  </button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#1a3a6a,#0066cc);margin-bottom:0;grid-column:1/-1"
    onclick="location.href='pages/tournament.html'">
    🏆 賽事大廳
  </button>
  <button class="btn-solo" style="background:linear-gradient(135deg,#3a1560,#7a2aaa);margin-bottom:0;grid-column:1/-1"
    onclick="location.href='pages/battlepass.html'">
    🌕 月見通行證
  </button>
</div>

<div class="footer">v1.0 · 台灣 16 張麻將</div>

<script type="module">
import { authManager } from './js/auth.js';
import { getSocket }   from './js/socket.js';
import toast           from './js/toast.js';
import dialog          from './js/dialog.js';
import analytics       from './js/analytics.js';

async function init() {
  // ── 登入檢查：無 token 導向登入頁 ──────────
  const token = localStorage.getItem('mj_token');
  if (!token) {
    location.replace('pages/login.html');
    return;
  }
  // 驗證 token 有效性（靜默刷新用戶資料）
  let user = await authManager.fetchMe();
  if (!user) {
    // Token 失效
    localStorage.removeItem('mj_token');
    localStorage.removeItem('mj_user');
    localStorage.removeItem('mj_auto_login');
    location.replace('pages/login.html');
    return;
  }

  analytics.init(authManager.getToken());
  document.getElementById('coinDisplay').textContent    = user.coins?.toLocaleString() || '0';
  document.getElementById('diamondDisplay').textContent = (user.diamond_balance || 0).toLocaleString();
  document.getElementById('vipDisplay').textContent     = user.vip_level || 0;
  document.getElementById('nameDisplay').textContent    = user.username || '玩家';

  // 連接 Socket 並監聽在線人數
  const socket = getSocket(authManager.getToken());
  socket.on('online_count', ({ count }) => {
    document.getElementById('onlineCount').textContent = count;
  });

  // 載入公告
  loadAnnouncements();
}

async function loadAnnouncements() {
  try {
    const res  = await fetch('/api/announcements');
    if (!res.ok) return;
    const { announcements } = await res.json();
    if (!announcements?.length) return;

    const TYPE_ICON = { info: 'ℹ️', warn: '⚠️', event: '🎉' };
    const bar = document.getElementById('announce-bar');
    bar.innerHTML = announcements.map(a => `
<div class="ann-card ${a.type}">
  <div class="ann-icon">${TYPE_ICON[a.type] || 'ℹ️'}</div>
  <div class="ann-body">
    <div class="ann-title">${a.pinned ? '📌 ' : ''}${escHtml(a.title)}</div>
    ${a.content ? `<div class="ann-text">${escHtml(a.content)}</div>` : ''}
  </div>
</div>`).join('');
    bar.style.display = 'flex';
  } catch (e) { /* 公告載入失敗不影響主功能 */ }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();

window.quickJoin = (betKey, roomType) => {
  const user = authManager.getUser();
  if (!user) { toast.warn('請先登入'); return; }
  analytics.quickJoin(betKey, roomType);
  location.href = `pages/game.html?betKey=${betKey}&roomType=${roomType}`;
};

window.createPrivateRoom = async () => {
  const user = authManager.getUser();
  if (!user) { toast.warn('請先登入'); return; }

  const betKey = await dialog.prompt('選擇桌金設定：', '100_30', {
    title: '🔒 建立私人房',
    placeholder: '10_3 / 100_30 / 100_30p / 1000_300',
  });
  if (!betKey) return;

  try {
    const res = await fetch('/api/room/private', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authManager.getToken()}` },
      body: JSON.stringify({ betKey }),
    });
    const data = await res.json();
    if (!res.ok) { toast.error(data.error || '建立失敗'); return; }

    // 複製邀請碼到剪貼簿
    navigator.clipboard?.writeText(data.inviteCode).catch(() => {});
    toast.success(`房間建立成功！邀請碼 ${data.inviteCode} 已複製`);

    const go = await dialog.confirm(
      `邀請碼：${data.inviteCode}\n\n已複製到剪貼簿，傳送給朋友即可加入。`,
      { title: '🔒 私人房已建立', okText: '立即進入', cancelText: '稍後再去' }
    );
    if (go) location.href = `pages/game.html?roomId=${data.roomId}&betKey=${betKey}&roomType=public`;
  } catch (e) {
    toast.error('建立失敗：' + e.message);
  }
};

window.joinByCode = async () => {
  const user = authManager.getUser();
  if (!user) { toast.warn('請先登入'); return; }

  const code = await dialog.prompt('', '', {
    title: '🔑 輸入邀請碼',
    placeholder: '請輸入 6 碼邀請碼',
  });
  if (!code) return;

  try {
    const res = await fetch('/api/room/join-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authManager.getToken()}` },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (!res.ok) { toast.error(data.error || '邀請碼無效'); return; }
    location.href = `pages/game.html?roomId=${data.roomId}&betKey=${data.betKey}&roomType=public`;
  } catch (e) {
    toast.error('加入失敗：' + e.message);
  }
};

// Service Worker 註冊
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

</body>
</html>
